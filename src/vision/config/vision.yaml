camera:
  # color_topic: "/camera/robot0_rgbd_camera/rgb/image_compressed" # sim
  # depth_topic: "/camera/robot0_rgbd_camera/depth/image_raw" # sim
  # intrin_topic: "/camera/robot0_rgbd_camera/rgb/camera_info" # sim

  color_topic: "/StereoNetNode/rectified_image" # d-robotics
  depth_topic: "/StereoNetNode/stereonet_depth" # d-robotics
  intrin_topic: "/StereoNetNode/stereonet_depth/camera_info" # d-robotics

  # color_topic: "/camera/color/image_raw" # orbbec
  # depth_topic: "/camera/depth/image_raw" # orbbec
  # intrin_topic: "/camera/color/camera_info" # orbbec

  # color_topic: "/camera/camera/color/image_raw" # realsense
  # depth_topic: "/camera/camera/aligned_depth_to_color/image_raw" # realsense
  # intrin_topic: "/camera/camera/color/camera_info" # realsense

  # color_topic: "/zed/zed_node/left/image_rect_color" # zed
  # depth_topic: "/zed/zed_node/depth/depth_registered" # zed
  # intrin_topic: "/zed/zed_node/left/camera_info" # zed
  intrin:
    fx: 206.445511
    fy: 206.445511
    cx: 224.958221
    cy: 242.717239
    distortion_model: 0
    distortion_coeffs:
      []
  extrin:
    # cam(x right y down z forward) -> head(x forward y left z up)
    # Note: pitch compensation is done in code, here we only put the real offset of
    -
      - 0.0753363073
      - 0.0190046262
      - 0.996977091
      - -0.0122268423
    -
      - -0.99715662
      - -0.000328667404
      - 0.0753561407
      - 0.0440084077
    -
      - 0.00175978895
      - -0.999819338
      - 0.018925827
      - -0.0283811111
    -
      - 0
      - 0
      - 0
      - 1
  pitch_compensation: 0
  yaw_compensation: 0
  z_compensation: 0
detection_model:
  model_path: ./src/vision/model/best_digua_second_10.3.engine
  confidence_threshold: 0.2
  nms_threshold: 0.4
  classnames: [Ball, Goalpost, Person, LCross, TCross, XCross, PenaltyPoint, Opponent, BRMarker]
  post_process:
    single_ball_assumption: false
    confidence_thresholds:
      Ball: 0.2
      Goalpost: 0.2
      Person: 0.2
      LCross: 0.1
      TCross: 0.1
      XCross: 0.1
      PenaltyPoint: 0.1
      Opponent: 0.5
      BRMarker: 0.2
segmentation_model:
  model_path: ./src/vision/model/best_seg_orin_10.3.engine
  confidence_threshold: 0.3
  nms_threshold: 0.9
use_depth: false
ball_pose_estimator:
  use_depth: false
  radius: 0.109
  down_sample_leaf_size: 0.01
  cluster_distance_threshold: 0.01
  fitting_distance_threshold: 0.01
  minimum_cluster_size: 150
  filter_distance: 1.2
  check_ball_height: true
human_like_pose_estimator:
  use_depth: false
  down_sample_leaf_size: 0.01
  fitting_distance_threshold: 0.01
  statistic_outlier_multiplier: 0.01
field_marker_pose_estimator:
  refine: false
  line_segment_area_threshold: 75
calibration:
  sync_max_time_diff_ms: 1400
  offset:
    exclude_distance: 2.0
    zero_translation: true
    field_marker_path: ./src/vision/config/field.yaml
  handeye:
    calibration_time: 2000-01-01-09-29-08
    reprojection_error: 3.5616553263245252
misc:
  save_data_nonstationary: true
# Phase1 §8: vision pipeline profiler (pure instrumentation)
vision_profiler:
  enable:                 true
  alert_fps_min:          40.0
  alert_drop_rate_max:    2.0
  alert_e2e_p95_ms_max:   20.0
  alert_jitter_ms_max:    5.0
  report_every_n_frames:  100
robot_name: "" # If there are multiple robots, specify the name, e.g., "robot0", "robot1", etc. Leave empty for a single robot